name: iOS Build and TestFlight

on:
  workflow_dispatch:
    inputs:
      upload_to_testflight:
        description: Upload signed IPA to TestFlight
        required: false
        default: false
        type: boolean

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: false

      - name: Install dependencies
        run: flutter pub get

      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update

      - name: Configure iOS signing
        env:
          IOS_DEVELOPMENT_TEAM: ${{ secrets.IOS_DEVELOPMENT_TEAM }}
        run: |
          if [ -z "$IOS_DEVELOPMENT_TEAM" ]; then
            echo "IOS_DEVELOPMENT_TEAM is not set, skipping local signing config."
            exit 0
          fi

          cat <<EOF > ios/Flutter/Signing.xcconfig
          DEVELOPMENT_TEAM = $IOS_DEVELOPMENT_TEAM
          CODE_SIGN_STYLE = Automatic
          EOF

      - name: Validate TestFlight secrets
        if: ${{ inputs.upload_to_testflight }}
        env:
          IOS_DEVELOPMENT_TEAM: ${{ secrets.IOS_DEVELOPMENT_TEAM }}
          APPSTORE_API_PRIVATE_KEY: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}
          APPSTORE_API_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          APPSTORE_CERTIFICATES_FILE_BASE64: ${{ secrets.APPSTORE_CERTIFICATES_FILE_BASE64 }}
          APPSTORE_CERTIFICATES_PASSWORD: ${{ secrets.APPSTORE_CERTIFICATES_PASSWORD }}
        run: |
          for secret_name in \
            IOS_DEVELOPMENT_TEAM \
            APPSTORE_API_PRIVATE_KEY \
            APPSTORE_API_KEY_ID \
            APPSTORE_ISSUER_ID \
            APPSTORE_CERTIFICATES_FILE_BASE64 \
            APPSTORE_CERTIFICATES_PASSWORD
          do
            if [ -z "${!secret_name}" ]; then
              echo "Missing required secret: ${secret_name}" >&2
              exit 1
            fi
          done

      - name: Build iOS without codesign
        if: ${{ !inputs.upload_to_testflight }}
        run: flutter build ios --release --no-codesign

      - name: Upload unsigned iOS app artifact
        if: ${{ !inputs.upload_to_testflight }}
        uses: actions/upload-artifact@v4
        with:
          name: ios-runner-app
          path: build/ios/iphoneos/Runner.app

      - name: Archive unsigned iOS app
        if: ${{ !inputs.upload_to_testflight && secrets.GOOGLE_DRIVE_SERVICE_ACCOUNT_JSON != '' && secrets.GOOGLE_DRIVE_IOS_FOLDER_ID != '' }}
        run: |
          cd build/ios/iphoneos
          ditto -c -k --sequesterRsrc --keepParent Runner.app Runner.app.zip

      - name: Import signing certificates
        if: ${{ inputs.upload_to_testflight }}
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPSTORE_CERTIFICATES_FILE_BASE64 }}
          p12-password: ${{ secrets.APPSTORE_CERTIFICATES_PASSWORD }}

      - name: Create export options
        if: ${{ inputs.upload_to_testflight }}
        run: |
          cat <<EOF > ios/ExportOptions.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "https://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>teamID</key>
            <string>${{ secrets.IOS_DEVELOPMENT_TEAM }}</string>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF

      - name: Build signed IPA
        if: ${{ inputs.upload_to_testflight }}
        run: flutter build ipa --release --export-options-plist=ios/ExportOptions.plist

      - name: Upload IPA artifact
        if: ${{ inputs.upload_to_testflight }}
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: build/ios/ipa/*.ipa

      - name: Upload to TestFlight
        if: ${{ inputs.upload_to_testflight }}
        uses: apple-actions/upload-testflight-build@v1
        with:
          app-path: build/ios/ipa/*.ipa
          issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_API_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}

      - name: Install rclone
        if: ${{ secrets.GOOGLE_DRIVE_SERVICE_ACCOUNT_JSON != '' && secrets.GOOGLE_DRIVE_IOS_FOLDER_ID != '' }}
        run: brew install rclone

      - name: Upload iOS build files to Google Drive
        if: ${{ secrets.GOOGLE_DRIVE_SERVICE_ACCOUNT_JSON != '' && secrets.GOOGLE_DRIVE_IOS_FOLDER_ID != '' }}
        shell: bash
        env:
          GOOGLE_DRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_DRIVE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_DRIVE_IOS_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_IOS_FOLDER_ID }}
        run: |
          mkdir -p .github/tmp
          printf '%s' "$GOOGLE_DRIVE_SERVICE_ACCOUNT_JSON" > .github/tmp/gdrive-service-account.json

          cat <<EOF > .github/tmp/rclone.conf
          [gdrive]
          type = drive
          scope = drive
          service_account_file = .github/tmp/gdrive-service-account.json
          root_folder_id = ${GOOGLE_DRIVE_IOS_FOLDER_ID}
          EOF

          release_dir="ios/${GITHUB_REF_NAME}/run-${GITHUB_RUN_NUMBER}-${GITHUB_SHA::7}"

          rclone --config .github/tmp/rclone.conf mkdir "gdrive:${release_dir}"

          if [ "${{ inputs.upload_to_testflight }}" = "true" ]; then
            ipa_path=$(find build/ios/ipa -maxdepth 1 -name '*.ipa' | head -n 1)
            rclone --config .github/tmp/rclone.conf copyto \
              "$ipa_path" \
              "gdrive:${release_dir}/$(basename "$ipa_path")"
          else
            rclone --config .github/tmp/rclone.conf copyto \
              build/ios/iphoneos/Runner.app.zip \
              "gdrive:${release_dir}/Runner.app.zip"
          fi
